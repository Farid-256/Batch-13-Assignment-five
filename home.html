<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <!-- Main Content -->
    <main class="bg-gray-50">
        <section id="main-content">
            <!-- Navbar -->
            <nav class="bg-white shadow py-5">
                <div class="w-[90%] mx-auto px-4">
                    <div class="flex justify-between items-center h-16">
                        <div class="flex-1 flex items-center justify-center md:justify-start">
                            <img class="w-10 md:w-[50px]" src="./assets/github-logo.png" alt="GitHub Logo">
                            <span class="hidden md:inline-block ml-3 text-lg md:text-xl font-bold text-gray-900">
                                GitHub Issues Tracker
                            </span>
                        </div>

                        
                        <div class="flex items-center gap-2">
                            <div class="relative w-48 md:w-64">
                                <input class="border border-gray-300 w-full py-1.5 p-2 rounded-md" id="search-input" type="text" placeholder="Search issues..." />
                            </div>
                            <button id="search-btn"
                                class="bg-blue-700 text-white px-4 md:px-5 py-2 rounded-md hover:bg-blue-500">
                                + New Issue
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        </section>

        <!-- Tabs & Header -->
        <section class="w-[80%] mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div
                class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 bg-white px-5 py-10 rounded-sm">
                <div>
                    <div class="flex gap-2">
                        <button class="bg-blue-700 text-white px-10 py-2 rounded-md cursor-pointer">All</button>
                        <button class="px-10 py-2 border border-gray-300 rounded-md cursor-pointer">Open</button>
                        <button class="px-10 py-2 border border-gray-300 rounded-md cursor-pointer">Closed</button>
                    </div>
                </div>
            </div>


            <div class="bg-white px-5 py-10 rounded-sm flex justify-between items-center">
                <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                    <div>
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 id="issue-count" class="font-bold text-xl">50 Issues</h3>
                        <h5 class="text-gray-400">Track and manage your project issues</h5>
                    </div>
                </div>

                <div class="flex items-center gap-5">
                    <div class="flex items-center gap-2">
                        <span class="inline-block w-3 h-3 bg-green-500 rounded-full"></span>
                        <span>Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="inline-block w-3 h-3 bg-purple-600 rounded-full"></span>
                        <span>Closed</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-[90%] mx-auto">
            <!-- Loading Spinner -->
            <div id="loading" class="flex justify-center py-20 hidden">
                <span class="loading loading-spinner text-primary"></span>
                <span class="loading loading-spinner text-secondary"></span>
                <span class="loading loading-spinner text-accent"></span>
                <span class="loading loading-spinner text-neutral"></span>
                <span class="loading loading-spinner text-info"></span>
                <span class="loading loading-spinner text-success"></span>
                <span class="loading loading-spinner text-warning"></span>
                <span class="loading loading-spinner text-error"></span>
            </div>

            <!-- Issues Grid -->
            <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

            </div>


            <!-- Modal -->
            <dialog id="issue-modal" class="modal">
                <div class="modal-box max-w-3xl">
                    <form method="dialog" class="flex justify-end">
                        <button
                            class="bg-blue-800 text-white border-none px-6 py-2 hover:bg-blue-500 hover:text-yellow-600">Close</button>
                    </form>
                    <h3 id="modal-title" class="font-bold text-xl mb-4"></h3>
                    <div id="modal-body" class="space-y-4 text-gray-700"></div>
                </div>
            </dialog>
        </section>
    </main>



    <script src="./index.js"></script>
</body>

</html>
