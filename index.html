<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issues tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">

    <section class="fixed inset-0 bg-gray-500 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <div class="flex justify-center">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <h1 class="text-2xl font-bold mt-4">GitHub Issues Tracker</h1>
                <p class="text-gray-400 mt-1">Sign in to manage your issues</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" required />
                    <p class="text-xs text-blue-500 mt-1">Default: admin</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="input input-bordered w-full" required />
                    <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
                </div>

                <button id="login-btn" type="submit" class="btn btn-primary w-full text-white">Sign in</button>
            </form>

            <p class="my-2 text-center text-gray-500">-----OR-----</p>

            <div class="text-center text-sm text-gray-600 bg-gray-300 p-5 rounded-md">
                <p>Demo Credentials:</p>
                <p class="font-medium">Username: admin</p>
                <p class="font-medium">Password: admin123</p>
            </div>
        </div>

    </section>




    
    <script>
        document.getElementById('login-btn').addEventListener('click', function (e) {
            e.preventDefault()
            const inputId = document.getElementById('username').value.trim()
            const inputPassword = document.getElementById('password').value.trim()

            if (inputId === 'admin' && inputPassword === 'admin123') {
                window.location.assign('./home.html')
            }
            else {
                alert('Invalid credentials! Use: admin / admin123')
            }
        })
    </script>
</body>

</html>
